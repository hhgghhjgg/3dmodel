name: DIRECT IMPORT TEST

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Blender 4.2
        run: |
          sudo apt-get update && sudo apt-get install -y wget unzip xz-utils
          wget -q https://download.blender.org/release/Blender4.2/blender-4.2.12-linux-x64.tar.xz
          tar -xf blender-4.2.12-linux-x64.tar.xz
          echo "$(pwd)/blender-4.2.12-linux-x64" >> $GITHUB_PATH

      - name: Clone and Install CharMorph
        run: |
          git clone --recursive --depth 1 https://github.com/Upliner/CharMorph.git /tmp/charmorph
          mkdir -p ~/.config/blender/4.2/scripts/addons/
          cp -r /tmp/charmorph ~/.config/blender/4.2/scripts/addons/char_morph

      - name: Try direct import
        run: |
          blender --background --python-expr "
          import bpy, addon_utils
          
          addon_utils.enable('char_morph')
          
          # پاکسازی صحنه
          bpy.ops.object.select_all(action='SELECT')
          bpy.ops.object.delete()
          
          # روش ۱: ایمپورت مستقیم
          try:
              from char_morph.library import OpImport
              OpImport.execute(None, bpy.context)
              print('✅ Character imported via OpImport.execute()')
          except Exception as e:
              print(f'❌ Method 1 failed: {e}')
          
          # روش ۲: bpy.ops با اسم کامل
          try:
              bpy.ops.char_morph.op_import()
              print('✅ Character imported via op_import')
          except:
              try:
                  bpy.ops.char_morph.import_character()
                  print('✅ Character imported via import_character')
              except Exception as e2:
                  print(f'❌ Method 2 failed: {e2}')
          
          # ذخیره
          bpy.ops.wm.save_as_mainfile(filepath='char_final.blend')
          print('✅ Saved')
          "
