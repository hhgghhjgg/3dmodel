name: TEST MPFB2 DOWNLOAD

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Test download MPFB2
        run: |
          wget -q https://github.com/makehumancommunity/mpfb2/releases/download/v2.0.0-alpha/mpfb2-2.0.0-alpha.zip
          if [ -f mpfb2-2.0.0-alpha.zip ]; then
            echo "✅ DOWNLOAD OK"
            ls -la mpfb2-2.0.0-alpha.zip
          else
            echo "❌ DOWNLOAD FAILED"
          fi
