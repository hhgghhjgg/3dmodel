name: TEST CharMorph (Fully Fixed)

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Blender 4.2
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip xz-utils
          wget -q https://download.blender.org/release/Blender4.2/blender-4.2.12-linux-x64.tar.xz
          tar -xf blender-4.2.12-linux-x64.tar.xz
          echo "$(pwd)/blender-4.2.12-linux-x64" >> $GITHUB_PATH

      - name: Clone CharMorph (with submodules)
        run: |
          git clone --recursive --depth 1 https://github.com/Upliner/CharMorph.git /tmp/charmorph
          echo "=== Root contents ==="
          ls -la /tmp/charmorph/
          echo "=== Data contents ==="
          ls -la /tmp/charmorph/data/ 2>/dev/null || echo "Data folder not found or empty"

      - name: Install CharMorph
        run: |
          mkdir -p ~/.config/blender/4.2/scripts/addons/
          # کل پوشه clone شده رو به عنوان یه ماژول به اسم char_morph کپی می‌کنیم
          cp -r /tmp/charmorph ~/.config/blender/4.2/scripts/addons/char_morph
          echo "=== Installed addons ==="
          ls -la ~/.config/blender/4.2/scripts/addons/

      - name: Enable CharMorph
        run: |
          blender --background --python-expr "
          import addon_utils
          result = addon_utils.enable('char_morph')
          if result:
              print('✅ CharMorph enabled successfully')
          else:
              print('❌ Failed to enable CharMorph')
              exit(1)
          "
