name: TEST MPFB2 v2.0.0

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Test download MPFB2 v2.0.0
        run: |
          wget -q https://github.com/makehumancommunity/mpfb2/releases/download/v2.0.0/mpfb2-2.0.0.zip
          if [ -f mpfb2-2.0.0.zip ]; then
            echo "✅ MPFB2 v2.0.0 DOWNLOADED"
            ls -la mpfb2-2.0.0.zip
          else
            echo "❌ FAILED"
          fi
