name: 🎀 Anime Girl Generator (with Repo Push)

on:
  workflow_dispatch:
    inputs:
      character_name:
        description: 'اسم کاراکتر'
        required: false
        default: 'AnimeGirl'

permissions:
  contents: write            # اجازه push به مخزن

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    env:
      CHARACTER_NAME: ${{ github.event.inputs.character_name || 'AnimeGirl' }}

    steps:
      # ─── ۱. دریافت کد از مخزن ───
      - name: 📥 Checkout repository
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      # ─── ۲. نصب بلندر (پیش‌فرض apt) ───
      - name: 🔧 Install Blender
        run: |
          sudo apt-get update -y
          sudo apt-get install -y blender
          blender --version

      # ─── ۳. نصب افزونه MPFB2 (دانلود و انتقال به پوشه addons) ───
      - name: 📦 Install MPFB2 addon
        run: |
          BLENDER_ADDONS_DIR="$HOME/.config/blender/$(blender --version | head -1 | awk '{print $2}')/scripts/addons"
          mkdir -p "$BLENDER_ADDONS_DIR"
          wget -q -O /tmp/mpfb2.zip https://github.com/makehumancommunity/mpfb2/archive/refs/heads/master.zip
          unzip -q /tmp/mpfb2.zip -d /tmp/mpfb2_extract
          mv /tmp/mpfb2_extract/mpfb2-master "$BLENDER_ADDONS_DIR/mpfb2"
          echo "✅ MPFB2 installed"

      # ─── ۴. فعال‌سازی افزونه در Blender ───
      - name: ✅ Enable MPFB2 addon
        run: |
          blender --background --python-expr "
          import bpy
          bpy.ops.preferences.addon_enable(module='mpfb2')
          bpy.ops.preferences.addon_refresh()
          print('MPFB2 enabled')
          "

      # ─── ۵. مرحله اول: ساخت کاراکتر پایه با MPFB2 ───
      - name: 🧬 Step 1 – Base character (MPFB2)
        run: blender --background --python mpfb2_base.py

      # ─── ۶. ذخیره موقت مرحله اول ───
      - name: 💾 Save blend (step1)
        run: |
          blender --background --python-expr "
          import bpy, os
          bpy.ops.wm.save_as_mainfile(filepath=os.path.join(os.getcwd(), 'char_step1.blend'))
          "

      # ─── ۷. مرحله دوم: سفارشی‌سازی با bpy ───
      - name: 🎨 Step 2 – Customize (bpy)
        run: blender --background char_step1.blend --python bpy_customize.py

      # ─── ۸. ذخیره نهایی ───
      - name: 💾 Save final blend
        run: |
          blender --background --python-expr "
          import bpy, os
          bpy.ops.wm.save_as_mainfile(filepath=os.path.join(os.getcwd(), 'char_final.blend'))
          "

      # ─── ۹. رندر ۴ نما با فایل مستقل ───
      - name: 📸 Render 4 angles
        run: blender --background char_final.blend --python render_4_angles.py

      # ─── ۱۰. بررسی وجود عکس‌ها ───
      - name: 🔍 Check renders folder
        run: |
          mkdir -p renders
          echo "Contents of renders/:"
          ls -la renders/ || true
          if ls renders/angle_*.png 1>/dev/null 2>&1; then
            echo "✅ PNG files found."
          else
            echo "⚠️ No PNG files found! Creating placeholder to avoid git error."
            touch renders/placeholder_missing.txt
          fi

      # ─── ۱۱. افزودن عکس‌ها به git و push به مخزن ───
      - name: 🚀 Push renders to repository
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add renders/
          if git diff --cached --quiet; then
            echo "Nothing to commit."
          else
            git commit -m "📸 Renders for ${CHARACTER_NAME} [skip ci]"
            git pull --rebase origin ${{ github.ref_name }} || true
            git push origin HEAD:${{ github.ref_name }}
            echo "✅ Renders pushed to repo!"
          fi

      # ─── ۱۲. آرتیفکت پشتیبان (اختیاری) ───
      - name: 📤 Upload backup artifact
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.CHARACTER_NAME }}-backup
          path: |
            renders/*.png
            char_final.blend
          retention-days: 30
