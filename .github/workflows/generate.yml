name: TEST CharMorph

on:
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Setup Blender 4.2
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip xz-utils
          wget -q https://download.blender.org/release/Blender4.2/blender-4.2.12-linux-x64.tar.xz
          tar -xf blender-4.2.12-linux-x64.tar.xz
          echo "$(pwd)/blender-4.2.12-linux-x64" >> $GITHUB_PATH

      - name: Clone CharMorph
        run: |
          git clone --depth 1 https://github.com/animate1978/CharMorph.git /tmp/charmorph
          echo "=== Contents of /tmp/charmorph ==="
          ls -la /tmp/charmorph/
          echo "=== Contents of /tmp/charmorph/src ==="
          ls -la /tmp/charmorph/src/

      - name: Install CharMorph
        run: |
          mkdir -p ~/.config/blender/4.2/scripts/addons/
          cp -r /tmp/charmorph/src/char_morph ~/.config/blender/4.2/scripts/addons/
          echo "=== Installed addons ==="
          ls -la ~/.config/blender/4.2/scripts/addons/

      - name: Enable CharMorph
        run: |
          blender --background --python-expr "
          import addon_utils
          result = addon_utils.enable('char_morph')
          if result:
              print('✅ CharMorph enabled successfully')
          else:
              print('❌ Failed to enable CharMorph')
              exit(1)
          "
