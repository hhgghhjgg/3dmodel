name: Generate 3D Character and Renders

on:
  workflow_dispatch:
    inputs:
      character_name:
        description: 'اسم کاراکتر'
        required: true
        default: 'AnimeGirl'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # ۱. دریافت کد از ریپازیتوری
      - name: Checkout repository
        uses: actions/checkout@v4

      # ۲. نصب بلندر 3.6.15 LTS (کاملاً سازگار با MPFB2)
      - name: Setup Blender 3.6 LTS
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip xz-utils
          wget -q https://download.blender.org/release/Blender3.6/blender-3.6.15-linux-x64.tar.xz
          tar -xf blender-3.6.15-linux-x64.tar.xz
          echo "$(pwd)/blender-3.6.15-linux-x64" >> $GITHUB_PATH

      # ۳. نصب افزونه MPFB2 نسخهٔ v2.0.0-alpha (سازگار با روش سنتی)
      - name: Install MPFB2 addon
        run: |
          git clone --depth 1 --branch v2.0.0-alpha https://github.com/makehumancommunity/mpfb2.git /tmp/mpfb2
          mkdir -p ~/.config/blender/3.6/scripts/addons/
          cp -r /tmp/mpfb2/src/mpfb ~/.config/blender/3.6/scripts/addons/
          # فعال‌سازی افزونه با روش استاندارد (بدون نیاز به سیستم Extension)
          blender --background --python-expr "
          import addon_utils
          result = addon_utils.enable('mpfb')
          if result:
              print('✅ MPFB2 enabled successfully')
          else:
              print('❌ Failed to enable MPFB2')
              exit(1)
          "

      # ۴. ساخت کاراکتر پایه (اسکریپت خودش فایل char_customized.blend را ذخیره می‌کند)
      - name: Step 1 - Generate base character
        run: blender --background --python mpfb2_base.py

      # ۵. بررسی وجود فایل میانی
      - name: Verify char_customized.blend
        run: |
          if [ -f char_customized.blend ]; then
            echo "✅ char_customized.blend exists"
          else
            echo "❌ char_customized.blend NOT found"
            exit 1
          fi

      # ۶. شخصی‌سازی کاراکتر (فایل میانی را باز کرده و char_final.blend را ذخیره می‌کند)
      - name: Step 2 - Customize character
        run: blender --background char_customized.blend --python bpy_customize.py

      # ۷. بررسی وجود فایل نهایی
      - name: Verify char_final.blend
        run: |
          if [ -f char_final.blend ]; then
            echo "✅ char_final.blend exists"
          else
            echo "❌ char_final.blend NOT found"
            exit 1
          fi

      # ۸. رندر چهار نما (جلو، چپ، عقب، راست)
      - name: Render 4 angles
        run: blender --background char_final.blend --python render_4_angles.py

      # ۹. بررسی خروجی رندرها
      - name: Verify renders
        run: |
          if [ -d renders ] && [ "$(ls -A renders/*.png 2>/dev/null)" ]; then
            echo "✅ Renders generated:"
            ls -la renders/
          else
            echo "❌ No PNG files in renders/"
            exit 1
          fi

      # ۱۰. آپلود آرتیفکت‌ها (فایل بلند نهایی و تصاویر)
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: character-and-renders
          path: |
            char_final.blend
            renders/
