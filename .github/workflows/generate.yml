name: Generate 3D Character and Renders

on:
  workflow_dispatch:
    inputs:
      character_name:
        description: 'اسم کاراکتر'
        required: true
        default: 'AnimeGirl'

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      # ۱. دریافت کد از ریپازیتوری
      - name: Checkout repository
        uses: actions/checkout@v4

      # ۲. نصب Blender 4.0.2
      - name: Setup Blender
        run: |
          sudo apt-get update
          sudo apt-get install -y wget unzip xz-utils
          wget -q https://download.blender.org/release/Blender4.0/blender-4.0.2-linux-x64.tar.xz
          tar -xf blender-4.0.2-linux-x64.tar.xz
          echo "$(pwd)/blender-4.0.2-linux-x64" >> $GITHUB_PATH

      # ۳. نصب افزونه MPFB2 (مستقیم از مخزن)
      - name: Install MPFB2 addon
        run: |
          git clone --depth 1 https://github.com/makehumancommunity/mpfb2.git /tmp/mpfb2
          mkdir -p ~/.config/blender/4.0/scripts/addons/
          cp -r /tmp/mpfb2/src/mpfb ~/.config/blender/4.0/scripts/addons/
          # فعال‌سازی افزونه
          blender --background --python-expr "
          import addon_utils
          addon_utils.enable('mpfb')
          print('✅ MPFB2 enabled')
          "

      # ۴. ساخت کاراکتر پایه (اسکریپت خودش char_customized.blend ذخیره می‌کنه)
      - name: Step 1 - Generate base character
        run: blender --background --python mpfb2_base.py

      # ۵. بررسی فایل میانی
      - name: Verify char_customized.blend
        run: |
          if [ -f char_customized.blend ]; then
            echo "✅ char_customized.blend exists"
          else
            echo "❌ char_customized.blend NOT found"
            exit 1
          fi

      # ۶. شخصی‌سازی (روی char_customized.blend اجرا و char_final.blend ذخیره می‌شه)
      - name: Step 2 - Customize character
        run: blender --background char_customized.blend --python bpy_customize.py

      # ۷. بررسی فایل نهایی
      - name: Verify char_final.blend
        run: |
          if [ -f char_final.blend ]; then
            echo "✅ char_final.blend exists"
          else
            echo "❌ char_final.blend NOT found"
            exit 1
          fi

      # ۸. رندر چهار نما
      - name: Render 4 angles
        run: blender --background char_final.blend --python render_4_angles.py

      # ۹. بررسی رندرها
      - name: Verify renders
        run: |
          if [ -d renders ] && [ "$(ls -A renders/*.png 2>/dev/null)" ]; then
            echo "✅ Renders generated:"
            ls -la renders/
          else
            echo "❌ No PNG files in renders/"
            exit 1
          fi

      # ۱۰. آپلود آرتیفکت‌ها
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: character-and-renders
          path: |
            char_final.blend
            renders/
